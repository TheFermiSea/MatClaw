name: Publish Docker image

on:
  push:
    branches: [main]
    paths: ['container/**']
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      build_cuda:
        description: 'Also build CUDA variant'
        required: false
        default: 'false'
        type: boolean

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/matclaw-agent

jobs:
  build-cpu:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          VERSION=$(node -p "require('./package.json').version")
          REPO_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          TAGS="${REPO_LOWER}:latest,${REPO_LOWER}:${VERSION}"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAGS="${TAGS},${REPO_LOWER}:${{ github.event.release.tag_name }}"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=ubuntu:24.04
            PYTORCH_INDEX=https://download.pytorch.org/whl/cpu

  build-cuda:
    if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.build_cuda == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Determine tags
        id: tags
        run: |
          VERSION=$(node -p "require('./package.json').version")
          REPO_LOWER=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
          TAGS="${REPO_LOWER}:cuda,${REPO_LOWER}:${VERSION}-cuda"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            TAGS="${TAGS},${REPO_LOWER}:${{ github.event.release.tag_name }}-cuda"
          fi
          echo "tags=${TAGS}" >> "$GITHUB_OUTPUT"

      - uses: docker/build-push-action@v6
        with:
          context: ./container
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            BASE_IMAGE=nvidia/cuda:12.8.1-cudnn-runtime-ubuntu24.04
            PYTORCH_INDEX=https://download.pytorch.org/whl/cu128
