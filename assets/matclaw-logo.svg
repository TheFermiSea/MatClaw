<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 260" fill="none">
  <defs>
    <!-- Crystal gradient -->
    <linearGradient id="crystal" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="50%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>
    <!-- Claw gradient -->
    <linearGradient id="claw-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#2DD4BF"/>
    </linearGradient>
    <!-- Bond glow -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- === ICON: Crystal lattice with claw marks === -->
  <g transform="translate(40, 30)">
    <!-- Diamond cubic unit cell (simplified projection) -->
    <!-- Back face -->
    <line x1="60" y1="40" x2="140" y2="40" stroke="#4F46E5" stroke-width="2" opacity="0.3"/>
    <line x1="140" y1="40" x2="140" y2="120" stroke="#4F46E5" stroke-width="2" opacity="0.3"/>
    <line x1="60" y1="40" x2="60" y2="120" stroke="#4F46E5" stroke-width="2" opacity="0.3"/>
    <line x1="60" y1="120" x2="140" y2="120" stroke="#4F46E5" stroke-width="2" opacity="0.3"/>

    <!-- Front face -->
    <line x1="30" y1="70" x2="110" y2="70" stroke="url(#crystal)" stroke-width="2.5"/>
    <line x1="110" y1="70" x2="110" y2="150" stroke="url(#crystal)" stroke-width="2.5"/>
    <line x1="30" y1="70" x2="30" y2="150" stroke="url(#crystal)" stroke-width="2.5"/>
    <line x1="30" y1="150" x2="110" y2="150" stroke="url(#crystal)" stroke-width="2.5"/>

    <!-- Connecting edges -->
    <line x1="30" y1="70" x2="60" y2="40" stroke="url(#crystal)" stroke-width="2" opacity="0.5"/>
    <line x1="110" y1="70" x2="140" y2="40" stroke="url(#crystal)" stroke-width="2" opacity="0.5"/>
    <line x1="110" y1="150" x2="140" y2="120" stroke="url(#crystal)" stroke-width="2" opacity="0.5"/>
    <line x1="30" y1="150" x2="60" y2="120" stroke="url(#crystal)" stroke-width="2" opacity="0.5"/>

    <!-- Interior bonds (tetrahedral) -->
    <line x1="70" y1="110" x2="50" y2="90" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
    <line x1="70" y1="110" x2="90" y2="90" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
    <line x1="70" y1="110" x2="50" y2="130" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>
    <line x1="70" y1="110" x2="90" y2="130" stroke="#2DD4BF" stroke-width="1.5" opacity="0.6" filter="url(#glow)"/>

    <!-- Atom nodes -->
    <!-- Corner atoms -->
    <circle cx="30" cy="70" r="6" fill="#4F46E5"/>
    <circle cx="110" cy="70" r="6" fill="#4F46E5"/>
    <circle cx="30" cy="150" r="6" fill="#4F46E5"/>
    <circle cx="110" cy="150" r="6" fill="#4F46E5"/>
    <circle cx="60" cy="40" r="5" fill="#4F46E5" opacity="0.5"/>
    <circle cx="140" cy="40" r="5" fill="#4F46E5" opacity="0.5"/>
    <circle cx="140" cy="120" r="5" fill="#4F46E5" opacity="0.5"/>
    <circle cx="60" cy="120" r="5" fill="#4F46E5" opacity="0.5"/>

    <!-- Tetrahedral center atom -->
    <circle cx="70" cy="110" r="7" fill="#2DD4BF"/>
    <circle cx="70" cy="110" r="4" fill="#fff" opacity="0.4"/>

    <!-- Bond midpoint atoms (basis atoms) -->
    <circle cx="50" cy="90" r="4.5" fill="#7C3AED"/>
    <circle cx="90" cy="90" r="4.5" fill="#7C3AED"/>
    <circle cx="50" cy="130" r="4.5" fill="#7C3AED"/>
    <circle cx="90" cy="130" r="4.5" fill="#7C3AED"/>

    <!-- Three claw scratch marks across the crystal -->
    <g opacity="0.85">
      <path d="M 120 55 Q 145 85 155 160 Q 157 175 152 180"
            stroke="url(#claw-grad)" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M 135 45 Q 165 80 178 155 Q 181 172 175 178"
            stroke="url(#claw-grad)" stroke-width="4" stroke-linecap="round" fill="none"/>
      <path d="M 150 38 Q 183 75 198 148 Q 202 168 196 175"
            stroke="url(#claw-grad)" stroke-width="3.5" stroke-linecap="round" fill="none"/>
    </g>
  </g>

  <!-- === TEXT: MatClaw === -->
  <g transform="translate(270, 85)">
    <!-- "Mat" in indigo -->
    <text font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="700" fill="#4F46E5">
      Mat
    </text>
    <!-- "Claw" in teal -->
    <text x="195" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="88" font-weight="700" fill="#2DD4BF">
      Claw
    </text>
  </g>

  <!-- Tagline -->
  <text x="275" y="145" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="22" fill="#6B7280" letter-spacing="0.5">
    AI-Powered Autonomous Materials Science Agent
  </text>

  <!-- Tool badges row -->
  <g transform="translate(275, 170)">
    <!-- QE badge -->
    <rect x="0" y="0" width="65" height="22" rx="4" fill="#4F46E5" opacity="0.12"/>
    <text x="32" y="15" font-family="monospace" font-size="11" fill="#4F46E5" text-anchor="middle" font-weight="600">QE 7.5</text>

    <!-- LAMMPS badge -->
    <rect x="75" y="0" width="65" height="22" rx="4" fill="#7C3AED" opacity="0.12"/>
    <text x="107" y="15" font-family="monospace" font-size="11" fill="#7C3AED" text-anchor="middle" font-weight="600">LAMMPS</text>

    <!-- RASPA3 badge -->
    <rect x="150" y="0" width="65" height="22" rx="4" fill="#2DD4BF" opacity="0.15"/>
    <text x="182" y="15" font-family="monospace" font-size="11" fill="#0D9488" text-anchor="middle" font-weight="600">RASPA3</text>

    <!-- MACE badge -->
    <rect x="225" y="0" width="55" height="22" rx="4" fill="#F59E0B" opacity="0.12"/>
    <text x="252" y="15" font-family="monospace" font-size="11" fill="#D97706" text-anchor="middle" font-weight="600">MACE</text>

    <!-- ASE badge -->
    <rect x="290" y="0" width="45" height="22" rx="4" fill="#EF4444" opacity="0.12"/>
    <text x="312" y="15" font-family="monospace" font-size="11" fill="#DC2626" text-anchor="middle" font-weight="600">ASE</text>

    <!-- pymatgen badge -->
    <rect x="345" y="0" width="80" height="22" rx="4" fill="#3B82F6" opacity="0.12"/>
    <text x="385" y="15" font-family="monospace" font-size="11" fill="#2563EB" text-anchor="middle" font-weight="600">pymatgen</text>
  </g>

  <!-- Subtle line under tagline -->
  <line x1="275" y1="205" x2="720" y2="205" stroke="url(#crystal)" stroke-width="1" opacity="0.2"/>

  <!-- Small description -->
  <text x="275" y="228" font-family="'Segoe UI', 'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#9CA3AF">
    Natural language → DFT · MD · MC · MLIP calculations in isolated containers
  </text>
</svg>
